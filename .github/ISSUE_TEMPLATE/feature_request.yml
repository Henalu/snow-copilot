name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! The more specific you can be, the better we can evaluate and prioritize it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow gap or friction point. What are you trying to do that is currently hard or impossible?
      placeholder: "As a ServiceNow developer, I often need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this feature to work.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority for your workflow
      options:
        - Nice to have
        - Important
        - Critical — blocking my usage
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - New action (Explain / Comment / Refactor / Document / etc.)
        - New record type support
        - New AI provider
        - UI / UX improvement
        - Performance
        - Settings / Configuration
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Have you found any workarounds? What's missing from them?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, or anything else that helps explain the request.
